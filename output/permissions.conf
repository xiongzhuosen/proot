# proot Permission Configuration File
#
# This file configures file ownership and permissions inside proot.
# It allows non-root users to run applications that require specific
# file ownership (e.g., PostgreSQL, MySQL, Nginx, etc.)
#
# Usage:
#   proot -0 --perm-config /path/to/this/file -R /path/to/rootfs /bin/bash
#   proot -i 1000:1000 --perm-config /path/to/this/file -R /path/to/rootfs /bin/bash
#
# Directives:
#   @rootfs /path/to/rootfs  - Sets rootfs path for username/group resolution
#                              (loads /etc/passwd and /etc/group from rootfs)
#
# Supported Formats:
#
# Format 1 (recommended): path_pattern user:group mode
#   /var/lib/postgresql  postgres:postgres  0755
#   /tmp/*               1000:1000          rwxrwxrwt
#
# Format 2 (ls -l style): mode_str user group path
#   drwxr-xr-x  postgres  postgres  /var/lib/postgresql
#   -rw-r--r--  root      root      /etc/passwd
#
# Format 3 (numeric): path_pattern uid:gid mode_octal
#   /data  70:70  0700
#
# Format 4 (simplified): path_pattern user mode
#   /var/lib/postgresql  postgres  0755
#
# Format 5 (find -printf style): path user:group:mode
#   /var/lib/postgresql postgres:postgres:0755
#
# Mode formats:
#   - Octal: "0755", "4755" (setuid), "2755" (setgid), "1755" (sticky)
#   - Symbolic: "rwxr-xr-x", "rwsr-xr-x" (setuid), "rwxrwxrwt" (sticky)
#   - Use "-" to keep original
#
# User/Group:
#   - Username: "postgres", "root", "www-data"
#   - UID/GID: "70", "1000"
#   - Use "-" to keep original
#
# Rules are matched in order, last matching rule wins.
# Wildcards (*, ?, []) and directory prefix matching are supported.

# Example: PostgreSQL configuration
# Uncomment and modify the @rootfs line to match your rootfs path
# @rootfs /data/data/com.termux/files/home/rootfs

# PostgreSQL data directory - must be owned by postgres user
# /var/lib/postgresql  postgres:postgres  0700
# /var/lib/postgresql/*  postgres:postgres  0700
# /var/lib/postgresql/**  postgres:postgres  0700

# PostgreSQL config files
# /etc/postgresql  postgres:postgres  0755
# /etc/postgresql/*  postgres:postgres  0644

# PostgreSQL log directory
# /var/log/postgresql  postgres:postgres  0755

# Run as root with postgres ownership on specific paths
# -0 --perm-config this-file -R /path/to/rootfs /bin/bash
