# Permission Configuration File for PRoot
# This file allows you to override file ownership and permissions for specific
# paths inside the proot environment. This is useful when running services like
# PostgreSQL that refuse to run with root-owned data directories.
#
# Format:
#   path=/exact/path uid=1000 gid=1000 mode=0755
#   /path/to/dir/** uid=1000 gid=1000
#
# - Lines starting with # are comments
# - path= specifies exact path match
# - /** suffix matches directory and all children recursively
# - uid/gid set the owner/group (numeric values)
# - mode sets permissions in octal (e.g., 0755, 0644)
#
# When a rule matches a path, the default uid mapping (where files owned by
# the host user appear as the fake uid) is skipped, and the real host
# ownership is preserved or the configured values are used.

# Example: PostgreSQL data directory
# PostgreSQL refuses to run if the data directory is owned by root.
# This config makes files under /var/lib/postgresql appear as owned by
# the postgres user (uid 999, gid 999 on Debian/Ubuntu).
#
# /var/lib/postgresql/** uid=999 gid=999

# Example: Specific file with custom permissions
# /etc/shadow mode=0640

# Example: Directory with specific owner
# path=/opt/app/data uid=1000 gid=1000 mode=0755
