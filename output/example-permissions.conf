# PRoot Permission Configuration File
# ====================================
#
# This file defines custom UID/GID ownership for specific paths
# inside the proot environment. Use with --perm-config option.
#
# Format:
#   path_pattern uid gid
#
# Rules:
#   - Lines starting with # are comments
#   - path_pattern supports glob wildcards (* ? [...])
#   - uid and gid must be numeric values
#   - Use '-' for uid or gid to keep default behavior
#   - Last matching rule wins (like .gitignore)
#
# Examples:
#   /var/lib/postgresql    70 70    # PostgreSQL data directory
#   /var/lib/postgresql/*  70 70    # All PostgreSQL files
#   /etc/shadow            0 42     # Shadow file (root:shadow)
#   /tmp/*                 -  -     # Keep default for temp files

# PostgreSQL example - database files owned by postgres (uid 70, gid 70)
/var/lib/postgresql      70 70
/var/lib/postgresql/*    70 70
/var/lib/postgresql/**   70 70

# MySQL/MariaDB example - owned by mysql (uid 999, gid 999)
# /var/lib/mysql         999 999
# /var/lib/mysql/*       999 999
# /var/lib/mysql/**      999 999

# Redis example - owned by redis (uid 998, gid 998)
# /var/lib/redis         998 998
# /var/lib/redis/*       998 998

# Custom service example
# /opt/myapp/data        1000 1000
# /opt/myapp/config      1000 1000

# System files with specific ownership
# /etc/shadow            0 42      # root:shadow
# /etc/gshadow           0 42      # root:shadow
# /etc/ssl/private       0 117     # root:ssl-cert
