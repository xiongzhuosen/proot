# PRoot Permission Configuration File
# ====================================
#
# 支持三种格式：
#
# 格式1（推荐）：path_pattern  user:group  mode
#   示例：/var/lib/postgresql  postgres:postgres  0755
#         /tmp/*               1000:1000          rwxrwxrwt
#
# 格式2（ls -l 风格，可直接从 rootfs 提取）：mode_str  user  group  path
#   示例：drwxr-xr-x  postgres  postgres  /var/lib/postgresql
#         -rw-r--r--  root      root      /etc/passwd
#
# 格式3（纯数字）：path_pattern  uid:gid  mode
#   示例：/data  70:70  0700
#
# 用户名/组名：
#   - 可直接写用户名：postgres, root, www-data
#   - 也可写数字 UID/GID：70, 1000
#   - 使用 "-" 保持原始值
#
# 权限格式：
#   - 八进制：0755, 4755(setuid), 2755(setgid), 1755(sticky)
#   - 符号：rwxr-xr-x, rwsr-xr-x(setuid), rwxr-sr-x(setgid), rwxrwxrwt(sticky)
#   - 使用 "-" 保持原始权限
#
# 指令：
#   @rootfs /path/to/rootfs  （指定 rootfs 路径，用于解析用户名）
#
# ====================================

# 指定 rootfs（用于从 /etc/passwd 和 /etc/group 解析用户名/组名）
@rootfs /

# PostgreSQL 示例
/var/lib/postgresql      postgres:postgres  0750
/var/lib/postgresql/*    postgres:postgres  0750
/var/lib/postgresql/**   postgres:postgres  0750

# MySQL/MariaDB 示例（注释掉，按需启用）
# /var/lib/mysql         mysql:mysql  0750
# /var/lib/mysql/*       mysql:mysql  0750

# Redis 示例
# /var/lib/redis         redis:redis  0750

# 系统文件示例（从 ls -l 直接提取的格式）
# -rw-r-----  root  shadow  /etc/shadow
# drwxr-x---  root  ssl-cert  /etc/ssl/private

# 临时目录保留 sticky bit
/tmp       root:root  rwxrwxrwt
/tmp/*     -    -     -
